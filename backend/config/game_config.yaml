consumption:
  food_days_per_person_per_day:
    filling:      1.0
    meager:       0.67
    bare_minimum: 0.33

  water_days_per_person_per_day:
    normal:    0.33
    heat_zone: 0.55

  fuel_gallons_per_day:
    highway:       3.5
    rough_terrain: 5.0
    rest_day:      0.5

travel:
  base_miles_per_day:
    steady:   15
    fast:     20
    reckless: 27

  terrain_modifier:
    deep_desert:  0.85
    high_desert:  0.90
    plains:       1.00
    swamp:        0.75
    woodland:     0.90
    urban_ruins:  0.80
    coastal:      0.95

  heat_zone_terrains: [deep_desert]

scavenging:
  success_rates:
    west_rural: 0.25
    west_city:  0.55
    east_rural: 0.55
    east_city:  0.70

  yield_multipliers:
    west_rural: 0.6
    west_city:  1.0
    east_rural: 1.0
    east_city:  1.4

  item_weights:
    food:     0.35
    water:    0.25
    ammo:     0.20
    medicine: 0.10
    fuel:     0.10

  item_exceptions:
    ammo:
      west_rural_bonus: 0.20
      east_city_penalty: 0.15
    water:
      west_rural_bonus: 0.15
      east_city_penalty: 0.10
    medicine:
      city_only: true
    fuel:
      base_success_rate: 0.35
      city_bonus: 0.15

  scavenge_yields:
    food:     { min: 1, max: 4, unit: "days" }
    water:    { min: 1, max: 3, unit: "days" }
    ammo:     { min: 5, max: 20, unit: "rounds" }
    medicine: { min: 1, max: 2, unit: "kits" }
    fuel:     { min: 2, max: 6, unit: "gallons" }

events:
  disease:
    base_chance_per_day: 0.05
    modifiers:
      bare_minimum_rations: 1.8
      meager_rations: 1.3
      river_crossing: 2.0
      swamp_terrain: 1.5
      bad_weather: 1.2
    types:
      - name: radiation_sickness
        weight: 0.20
        severity: moderate
        health_damage_per_day: 15
        cure: medicine
      - name: infected_wound
        weight: 0.30
        severity: mild
        health_damage_per_day: 8
        cure: medicine
      - name: dysentery
        weight: 0.25
        severity: moderate
        health_damage_per_day: 12
        cure: medicine
      - name: heat_exhaustion
        weight: 0.15
        severity: mild
        health_damage_per_day: 5
        cure: rest
        terrain_requirement: deep_desert
      - name: fever
        weight: 0.10
        severity: severe
        health_damage_per_day: 20
        cure: medicine

  breakdown:
    base_chance_per_day: 0.06
    modifiers:
      vehicle_condition_below_50: 1.5
      vehicle_condition_below_25: 2.5
      reckless_pace: 1.4
      rough_terrain: 1.3
    types:
      - name: flat_tire
        weight: 0.40
        fix_with: spare_tire
        scavenge_fix: true
        trade_goods_cost: { min: 3, max: 6 }
        time_days: 1
        vehicle_damage: 0
      - name: engine_failure
        weight: 0.25
        fix_with: engine_kit
        scavenge_fix: true
        trade_goods_cost: { min: 8, max: 15 }
        time_days: 2
        vehicle_damage: 10
      - name: minor_damage
        weight: 0.35
        fix_with: generic_parts
        scavenge_fix: true
        trade_goods_cost: { min: 2, max: 5 }
        time_days: 1
        vehicle_damage: 5

  raider_attack:
    base_chance_per_day: 0.04
    modifiers:
      las_vegas_region: 2.5
      high_danger_landmark: 2.0
      low_ammo_below_10: 1.4
    outcomes:
      - result: repelled
        weight: 0.50
        ammo_cost: { min: 5, max: 15 }
        health_damage: { min: 0, max: 10 }
      - result: ambushed
        weight: 0.30
        trade_goods_stolen: { min: 2, max: 8 }
        health_damage: { min: 5, max: 20 }
      - result: fled
        weight: 0.20
        fuel_cost: 3
        health_damage: 0

  weather_change:
    chance_per_day: 0.25
    distributions:
      january:   { clear: 0.20, cloudy: 0.30, rain: 0.25, storm: 0.15, extreme_cold: 0.10 }
      february:  { clear: 0.25, cloudy: 0.30, rain: 0.25, storm: 0.10, extreme_cold: 0.10 }
      march:     { clear: 0.35, cloudy: 0.30, rain: 0.25, storm: 0.10, extreme_cold: 0.00 }
      april:     { clear: 0.40, cloudy: 0.30, rain: 0.20, storm: 0.10, extreme_cold: 0.00 }
      may:       { clear: 0.35, cloudy: 0.25, rain: 0.20, storm: 0.10, extreme_heat: 0.10 }
      june:      { clear: 0.30, cloudy: 0.20, rain: 0.15, storm: 0.10, extreme_heat: 0.25 }
      july:      { clear: 0.25, cloudy: 0.20, rain: 0.15, storm: 0.15, extreme_heat: 0.25 }
      august:    { clear: 0.30, cloudy: 0.20, rain: 0.20, storm: 0.15, extreme_heat: 0.15 }
      september: { clear: 0.40, cloudy: 0.25, rain: 0.20, storm: 0.10, extreme_heat: 0.05 }
      october:   { clear: 0.45, cloudy: 0.30, rain: 0.20, storm: 0.05, extreme_cold: 0.00 }
      november:  { clear: 0.30, cloudy: 0.30, rain: 0.25, storm: 0.10, extreme_cold: 0.05 }
      december:  { clear: 0.20, cloudy: 0.30, rain: 0.20, storm: 0.15, extreme_cold: 0.15 }

  weather_travel_modifier:
    clear:        1.00
    cloudy:       0.95
    rain:         0.80
    storm:        0.55
    extreme_heat: 0.70
    extreme_cold: 0.60

  weather_water_modifier:
    extreme_heat: 1.6
    clear:        1.0
    cloudy:       1.0
    rain:         0.8
    storm:        0.8
    extreme_cold: 1.0

health:
  max: 100
  thresholds:
    good:     { min: 75, max: 100 }
    fair:     { min: 45, max: 74 }
    poor:     { min: 20, max: 44 }
    critical: { min: 1,  max: 19 }
    dead:     0

  medicine_recovery_per_kit: 30
  rest_recovery_per_day: 8
  morale_death_penalty: 5

vehicle:
  starting_condition: 100
  daily_wear: 1
  fast_pace_wear: 2
  reckless_pace_wear: 4
  rough_terrain_wear: 2

parts:
  spare_tire:
    fixes: [flat_tire]
    engineer_covers_events: 2
    carpenter_covers_events: 1
  engine_kit:
    fixes: [engine_failure]
    engineer_covers_events: 2
    carpenter_covers_events: 1
  generic_parts:
    fixes: [minor_damage]
    engineer_covers_events: 2
    carpenter_covers_events: 1

game_over:
  win_condition: "reach Washington DC"
  loss_conditions:
    - all_party_dead
    - out_of_fuel_stranded
    - vehicle_condition_zero
  max_days: 180
