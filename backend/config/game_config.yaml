trail:
  total_distance: 3245
  origin: "Long Beach, CA"
  destination: "Washington, DC"
  landmarks:
    - name: "Las Vegas"
      state: "NV"
      mile: 270
      type: settlement
      faction: raiders
      terrain: deep_desert
      region: west
      danger_level: high
      description: "Raider-controlled ruins. The Strip is a black market now."

    - name: "Phoenix"
      state: "AZ"
      mile: 565
      type: settlement
      faction: survivors
      terrain: deep_desert
      region: west
      danger_level: medium
      description: "Scorched sprawl. Sparse but stable survivor camp on the north edge."

    - name: "Roswell"
      state: "NM"
      mile: 1025
      type: settlement
      faction: cult
      terrain: high_desert
      region: west
      danger_level: medium
      bunker_ceo_unlocks_hidden_stock: true
      description: "Cult territory. They believe the apocalypse was extraterrestrial."

    - name: "Fort Worth"
      state: "TX"
      mile: 1525
      type: settlement
      faction: militia
      terrain: plains
      region: west
      danger_level: low
      description: "Texas militia stronghold. Largest settlement west of the Mississippi."

    - name: "Shreveport"
      state: "LA"
      mile: 1805
      type: settlement
      faction: survivors
      terrain: swamp
      region: west
      danger_level: medium
      description: "Rough swamp town. Disease is rampant but so is medicine production."

    - name: "Mississippi Crossing"
      state: "MS"
      mile: 2005
      type: event
      faction: none
      terrain: swamp
      region: west
      danger_level: high
      description: "The bridges are down. You must find a way across."
      crossing_options:
        - id: bridge
          label: "Search for intact bridge"
          fuel_cost: 2
          time_days: 2
          vehicle_damage: 0
          risk: high
          trade_goods_cost: 0
          notes: "Raider-held. Combat likely."
        - id: ferry
          label: "Pay the ferryman"
          fuel_cost: 0
          time_days: 1
          vehicle_damage: 0
          risk: low
          trade_goods_cost: 12
          notes: "Safe but expensive. Requires trade goods."
        - id: raft
          label: "Build a raft"
          fuel_cost: 0
          time_days: 3
          vehicle_damage: 25
          risk: medium
          trade_goods_cost: 0
          notes: "Carpenter occupation halves vehicle damage."
        - id: detour
          label: "Take the long detour"
          fuel_cost: 8
          time_days: 4
          vehicle_damage: 0
          risk: low
          trade_goods_cost: 0
          notes: "Safe but burns fuel and time."

    - name: "Tuscaloosa"
      state: "AL"
      mile: 2275
      type: settlement
      faction: community
      terrain: woodland
      region: east
      danger_level: low
      description: "Stadium-fortress. Farming commune. Suspicious of outsiders but fair."

    - name: "Atlanta"
      state: "GA"
      mile: 2425
      type: settlement
      faction: contested
      terrain: urban_ruins
      region: east
      danger_level: high
      description: "Largest city on the route. Faction wars make it dangerous but well-supplied."

    - name: "Charleston"
      state: "SC"
      mile: 2715
      type: settlement
      faction: naval
      terrain: coastal
      region: east
      danger_level: low
      description: "Naval faction controls the port. Sea trade makes it the most civilized stop."

occupations:
  bunker_ceo:
    label: "Bunker CEO"
    starting_budget: 80
    trade_modifier: 1.8
    repair_modifier: 1.0
    combat_modifier: 0.8
    scavenge_modifier: 1.0
    carpenter_shelter_modifier: 1.0
    morale_base: -5
    description: >
      You survived the apocalypse in a private bunker while others suffered.
      You have money and connections, but your hands have never seen hard work.
    perk: "Negotiation — better prices at every settlement and unlocks hidden inventory."

  engineer:
    label: "Engineer"
    starting_budget: 50
    trade_modifier: 1.0
    repair_modifier: 0.5
    repair_success_rate: 0.90
    combat_modifier: 1.0
    scavenge_modifier: 1.0
    scavenge_electronics_bonus: 0.4
    parts_efficiency: 2.0
    morale_base: 0
    description: >
      Systems thinker. You kept machines running before, and you keep them running now.
      The vehicle is your domain.
    perk: "Mechanics — repairs cost 50% less and each spare parts kit covers two breakdowns."

  carpenter:
    label: "Carpenter"
    starting_budget: 30
    trade_modifier: 1.0
    repair_modifier: 1.0
    combat_modifier: 1.1
    scavenge_modifier: 1.0
    scavenge_materials_bonus: 0.4
    shelter_modifier: 0.5
    raft_damage_modifier: 0.5
    morale_base: 5
    description: >
      You build what you need and fix what you can. People trust someone practical.
      You can't fix an engine, but you can fortify anything.
    perk: "Builder — shelter events cost half, raft crossing halves vehicle damage."

